# 物品箱（寶箱）測試資料
# items: 隨機抽取型（機率）
# all_items: 全給型（固定給所有物品）
# key_items: 鑰匙開啟型

items:
  # ──────────────────────────────────────────────────────────────────
  # 漢的袋子 (80001) — 火龍窟副本門票來源（MISS-P2-016）
  # 官方介紹：「每次開到冷冽的氣息一個」+ 隨機金幣 / 各色藥水
  # 機率分配：冷氣 30%、金幣 35%、紅藥 15%、橙藥 12%、白藥 8%
  # ──────────────────────────────────────────────────────────────────
  - box_item_id: 80001
    get_item_id: 80020   # 冷冽的氣息（門票）
    random_int: 100
    random: 30
    min_count: 1
    max_count: 1
    broadcast: false
    bless: -1
    enchant: 0
  - box_item_id: 80001
    get_item_id: 40308   # 金幣
    random_int: 100
    random: 35
    min_count: 500
    max_count: 1500
    broadcast: false
    bless: -1
    enchant: 0
  - box_item_id: 80001
    get_item_id: 40010   # 治癒藥水（紅）
    random_int: 100
    random: 15
    min_count: 3
    max_count: 8
    broadcast: false
    bless: -1
    enchant: 0
  - box_item_id: 80001
    get_item_id: 40011   # 強力治癒藥水（橙）
    random_int: 100
    random: 12
    min_count: 2
    max_count: 5
    broadcast: false
    bless: -1
    enchant: 0
  - box_item_id: 80001
    get_item_id: 84072   # 純白的萬能藥
    random_int: 100
    random: 8
    min_count: 1
    max_count: 1
    broadcast: false
    bless: -1
    enchant: 0

  # 古老皮袋(40167) — 隨機開出鑽石或魔法寶石
  - box_item_id: 40167
    get_item_id: 40044    # 鑽石
    random_int: 100
    random: 50            # 50% 機率
    min_count: 1
    max_count: 3
    broadcast: false
    bless: -1
    enchant: 0
  - box_item_id: 40167
    get_item_id: 40318    # 魔法寶石
    random_int: 100
    random: 50            # 50% 機率
    min_count: 1
    max_count: 1
    broadcast: false
    bless: -1
    enchant: 0

all_items:
  # 古老絲袋(40168) — 固定給治癒藥水 + 強力治癒 + 加速藥水
  - box_item_id: 40168
    get_item_id: 40010    # 治癒藥水
    count: 5
    use_type: 0
    bless: -1
    enchant: 0
    broadcast: false
  - box_item_id: 40168
    get_item_id: 40011    # 強力治癒藥水
    count: 3
    use_type: 0
    bless: -1
    enchant: 0
    broadcast: false
  - box_item_id: 40168
    get_item_id: 40013    # 自我加速藥水
    count: 2
    use_type: 0
    bless: -1
    enchant: 0
    broadcast: false

key_items: []
