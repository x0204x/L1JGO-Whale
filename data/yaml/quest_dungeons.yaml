# ============================================================================
# 任務副本定義（MISS-P0-003）
# ============================================================================
#
# Java 對照：QuestMapTable + WorldQuest + L1QuestUser + QuesttSpawnTable
# Go 實作：data/quest_dungeon.go + world/quest_instance.go + system/quest_world.go
#
# 設計目標：單一宣告檔涵蓋一個副本的全部行為（資料 + 進場 + 出生 + 結束 + 獎勵 + Hook）
#         讓未來新增副本只需要動這個檔案 + 可選 Lua hook，不動 Go 程式碼。
#
# 完整 schema 與每個欄位的語義詳見 docs/副本系統開發文檔.md 第 4 章。
#
# ----------------------------------------------------------------------------
# Schema 概覽（單一 dungeon 條目）：
#
# - id: int32              # 副本任務 ID（對應 Java questid）
#   name: string           # 中文顯示名稱
#   map_id: int16          # 副本地圖 ID
#   max_users: int32       # 同副本最大人數（0=不限）
#   time_limit: int32      # 時間限制秒數（-1=不限）
#   out_stop: bool         # 一人離開即整副本結束
#
#   entry:                 # 進場條件（資料驅動 DSL）
#     min_level: int32
#     max_level: int32     # 0=不限
#     class_mask: int32    # 1=王族 2=騎士 4=精靈 8=法師 16=黑妖 32=龍騎 64=幻術（3.80C 無戰士，全職業=127）
#     required_items: [{ item_id, count, consume }]
#     required_quest_step: [{ quest_id, step }]
#     forbidden_buffs: [int32]
#     teleport_to: { x, y, heading }   # 進場座標（map_id 預設用副本 map_id）
#     reject_message: int32             # 拒絕時送 S_ServerMessage(N)
#
#   exit:                  # 結束規則
#     teleport_to: { x, y, map_id, heading }   # 倖存者傳送目的地
#     cleanup_items: [int32]                   # 離場刪除的物品 ID
#     reward_on_clear: [{ item_id, count } | { exp } | { adena }]
#
#   rounds:                # Round 引擎（多階段出生）
#     - id: int32                # -1=入場即出生、>=0=後續輪
#       trigger: enum            # on_enter | on_round_clear | on_timer | on_lua
#       timer: int32             # 秒（trigger=on_timer 時用）
#       spawns: [{ npc_id, count, area: [x1,y1,x2,y2] 或 fixed: [x,y], heading, group_id }]
#
#   hooks:                 # Lua hook（可選）
#     on_enter: "dungeons/xxx.lua#on_enter"
#     on_npc_death: "dungeons/xxx.lua#on_npc_death"
#     on_last_mob_death: "dungeons/xxx.lua#on_last_mob_death"
#     on_player_death: "dungeons/xxx.lua#on_player_death"
#     on_time_out: "dungeons/xxx.lua#on_time_out"
#     on_exit: "dungeons/xxx.lua#on_exit"
#
# ----------------------------------------------------------------------------

dungeons:
  # ----------------------------------------------------------------------------
  # 副本框架驗證 demo（MISS-P0-003 Stage E）
  #
  # 目的：以最小可用副本驗證 Stage A-D 框架（Round 引擎、ShowID 隔離、NPC 生命週期）。
  # 不對應任何 Java 副本——這是純 Go 端的「Hello World 副本」。
  #
  # 入場：NPC 動作 "enter_demo_dungeon"（透過 npcaction.go 路由到 QuestWorld.Enter）。
  # 離場：NPC 動作 "exit_demo_dungeon" 或自動結束（time_limit 過期 / 玩家斷線）。
  #
  # 真實內容副本（火龍窟、屠龍、Chapter01R）歸 MISS-P2-015/017/019。
  # ----------------------------------------------------------------------------
  - id: 1001
    name: "副本框架驗證 demo"
    map_id: 6666
    max_users: 4
    time_limit: 600   # 10 分鐘上限
    out_stop: false
    entry:
      min_level: 1
      teleport_to: { x: 32700, y: 32700, heading: 4 }
    exit:
      teleport_to: { x: 32628, y: 32789, map_id: 4, heading: 4 }   # 失敗/結束 → 王城
    rounds:
      - id: -1
        trigger: on_enter
        spawns:
          - { npc_id: 45005, count: 2, fixed: [32700, 32702] }  # 青蛙
      - id: 1
        trigger: on_round_clear
        spawns:
          - { npc_id: 45005, count: 1, fixed: [32700, 32704] }  # 第二波青蛙

  # ----------------------------------------------------------------------------
  # 火龍窟副本（MISS-P2-016）
  #
  # 官方流程：
  #   1. 威頓村 → NPC 漢(46180) → 給「漢的袋子」(80001，24h cooldown)
  #   2. 點擊袋子 → 隨機產「冷冽的氣息」(80020) 或金幣/藥水
  #   3. 持冷氣 → NPC 愛德納斯(46181) → 消耗冷氣 → 傳送進 mapid 2600
  #   4. 進場後 → 入口「奄奄一息的死亡騎士」(46164) → 對話拿「真死亡騎士烈炎之劍」(850)
  #   5. **必須裝備 850** 才能對副本怪造成傷害（NPC.weapon_required 機制）
  #   6. 三區域漸進戰鬥：第 1 區 → 第 2 區 → 第 3 區 → 最終 Boss 三選一
  #   7. Boss 死亡 = 通關 → 回奇岩 (33702, 32502, mapid 4) + 刪除 850
  #
  # 設計取捨：
  #   - max_users=1 對齊官方「單人副本」描述（不是 815 SQL 預設的 8）
  #   - 不做 mapid 2699 過渡（官方流程直接傳 2600）
  #   - Boss 三選一用框架原生 random_pick，不寫 Lua hook（足夠處理）
  #   - cleanup_items=[850] 對應 Java L1QuestUser.java:138-146 「離場不在 2600 → 刪除」
  #   - 出生座標範圍依 mapid 2600 邊界 (32512,32959)~(32704,33087) 內
  #
  # Java 對照：
  #   FireDragonQuestLv60.MAPID=2600；QuestId 對應 server_quest_maps 條目
  #   server_quest_maps[2600] = users=8/time=1800（我們改 max_users=1）
  # ----------------------------------------------------------------------------
  # ─── 火龍窟 Phase 1：前室 ───────────────────────────────────────────────
  # 玩家從威頓村愛德納斯傳送進來，只有奄奄一息的死亡騎士；
  # 收下「真‧死亡騎士烈炎之劍」之後過場進真副本（148）。
  # mapid 2699 = 火龍巢穴(接任務) — 對應 380 reference Npc_FireDragon.java
  - id: 147
    name: "火龍窟前室"
    map_id: 2699
    max_users: 1
    time_limit: 3600     # 1 小時（伺服器端強制；地監倒數 UI 需另外接 mapTimerGroups）
    out_stop: true
    entry:
      min_level: 60
      class_mask: 127
      required_items:
        - { item_id: 80020, count: 1, consume: false }   # 冷冽的氣息：前室只驗證、不消耗
      teleport_to: { x: 32624, y: 33054, heading: 5 }    # 380 reference 落點
      reject_message: 1413
    exit:
      teleport_to: { x: 33705, y: 32504, map_id: 4, heading: 4 }
    rounds:
      - id: -1
        trigger: on_enter
        spawns:
          - { npc_id: 46164, count: 1, fixed: [32623, 33057], heading: 5, auxiliary: true }   # 奄奄一息的死亡騎士
    scenes:
      # 入場後死亡騎士 9 行對白
      - id: "dying_knight_intro"
        trigger: on_enter
        anchor_npc: 46164
        lines:
          - { delay: 2000,  speaker: player, text: "你是誰" }
          - { delay: 5000,  speaker: npc,    text: "全..部都要破壞 . 所有的 ..都需要破壞.." }
          - { delay: 8000,  speaker: npc,    text: "我? 我是..誰??" }
          - { delay: 11000, speaker: npc,    text: "騎士..對..我是騎士..為什麼我在這裡" }
          - { delay: 15000, speaker: player, text: "騎..士" }
          - { delay: 18000, speaker: npc,    text: "恩..我是騎士..." }
          - { delay: 21000, speaker: npc,    text: "相信自己的能力應該能跟巴拉卡斯抗衡" }
          - { delay: 25000, speaker: player, text: "被巴拉卡斯打敗了嗎" }
          - { delay: 28000, speaker: npc,    text: "我失去理性前.快拿這把劍逃走吧." }

  # ─── 火龍窟 Phase 2：真副本 ─────────────────────────────────────────────
  # 死亡騎士給劍時觸發 transition：靜默退出 147 → 進入 148。
  # 80020 已在死亡騎士 action 的 take_item effect 消耗，此處不再驗證。
  - id: 148
    name: "火龍巢穴"
    map_id: 2600
    max_users: 1
    time_limit: 1800     # 30 分鐘
    out_stop: true       # 單人副本：玩家離場即結束
    entry:
      min_level: 60
      class_mask: 127    # 全職業（3.80C 無戰士）
      teleport_to: { x: 32626, y: 33054, heading: 5 }
      reject_message: 1413
    exit:
      teleport_to: { x: 33705, y: 32504, map_id: 4, heading: 4 }   # 威頓村中央（815: etcitem_teleport 49185 標準傳送點）
      cleanup_items: [850]   # 真死亡騎士烈炎之劍：離開副本即刪除
    rounds:
      # 入場時：第 1 區域怪（死亡騎士已留在前室，不再 spawn）
      # 全部使用副本專屬怪「火龍的 XXX」系列（對齊 380 reference 230255+）
      - id: -1
        trigger: on_enter
        spawns:
          - { npc_id: 111525, count: 5, area: [32560, 33020, 32630, 33080] }   # 火龍的火炎蛋
          - { npc_id: 111526, count: 3, area: [32560, 33020, 32630, 33080] }   # 火龍的火焰戰士
          - { npc_id: 111527, count: 3, area: [32560, 33020, 32630, 33080] }   # 火龍的火焰弓箭手
          - { npc_id: 111524, count: 1, area: [32560, 33020, 32630, 33080] }   # 火龍的雷歐（第一關卡守門人）
      # 第 1 區清光 → 第 2 區
      - id: 1
        trigger: on_round_clear
        spawns:
          - { npc_id: 111525, count: 5, area: [32580, 32990, 32650, 33050] }   # 火龍的火炎蛋
          - { npc_id: 111528, count: 1, area: [32580, 32990, 32650, 33050] }   # 火龍的祭品貝奈首領
          - { npc_id: 111529, count: 2, area: [32580, 32990, 32650, 33050] }   # 火龍的阿西塔基奧
          - { npc_id: 111530, count: 1, area: [32580, 32990, 32650, 33050] }   # 火龍的紅雷歐（第二關卡守門人）
      # 第 2 區清光 → 第 3 區
      - id: 2
        trigger: on_round_clear
        spawns:
          - { npc_id: 111525, count: 5, area: [32600, 32960, 32680, 33020] }   # 火龍的火炎蛋
          - { npc_id: 111534, count: 1, area: [32600, 32960, 32680, 33020] }   # 火龍的不死鳥（區域版）
          - { npc_id: 111533, count: 2, area: [32600, 32960, 32680, 33020] }   # 火龍的熔岩高崙
          - { npc_id: 111531, count: 1, area: [32600, 32960, 32680, 33020] }   # 火龍的火燒雷歐（第三關卡守門人）
      # 第 3 區清光 → 最終 Boss 三選一
      - id: 3
        trigger: on_round_clear
        random_pick: true   # 從下列 3 種 Boss 隨機選 1 種出生
        spawns:
          - { npc_id: 111532, count: 1, fixed: [32650, 32990], heading: 4 }    # 伊弗利特
          - { npc_id: 4070080, count: 1, fixed: [32650, 32990], heading: 4 }   # 不死鳥（Boss 版）
          - { npc_id: 4070081, count: 1, fixed: [32650, 32990], heading: 4 }   # 巴拉卡斯
    # 真副本沒 scenes；對白在前室 147 已演完

