# 火神精煉合成配方 — MakeItem_Window (type 49) 合成路徑
#
# 來源：客戶端 MakeInfo.tbl + 反編譯 SmithUI 結構（RVA 0x29774D ccdhdd 封包）
# 流程：
#   1. 客戶端讀取 MakeInfo.tbl 顯示配方清單
#   2. 玩家選配方 → 開啟 MakeItem_Window
#   3. 客戶端送 C_PledgeContent data=14：
#        [D npcObjID][H actionID][D mainItem][D plusItem]
#   4. server 用 actionID 在此表查配方 → 扣材料 + 給成品
#
# MakeInfo.tbl 欄位（已由 SmithUI 反編譯確認）：
#   col1 = actionID（封包 H 欄位，[SmithUI+0x1dc]）
#   col2 = 火神結晶體（80029）需要數量，對應 Crystalitem_Icon
#   col3 = 火神契約（80028）需要數量，對應 Contractitem_Icon
#   col4 = 基礎成功率（%）UI 顯示，火神之槌每個 +1%
#   col5 = UI display key（圖檔/名稱）
#
# 目前 11 筆來自 d:/l1jclient-rustx64/target/text-search/MakeInfo.tbl
# catalyst_item_id / catalyst_count 不在 MakeInfo.tbl 中（5 個 Catalyst 槽位的具體素材）
# 後續可由 server SQL／資料表補（yiwei 380 SQL 無對應表）

