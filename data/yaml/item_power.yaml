# ============================================================================
# 物品強化加成（L1ItemPower）— MISS-P1-005
# ============================================================================
#
# Java 對照：com.lineage.server.model.Instance.L1ItemPower（static load()）
#
# 每個物品有一條或多條規則：
#   - per_enchant：每強化 +1 額外提供的點數
#   - min_enchant：最低觸發強化等級（省略=1，從 +1 開始）
#   - enchant_offset：計算前先扣除（用於「從 +N 開始才計算」的物品）
#
# 公式：bonus = (enchant_level - enchant_offset) * per_enchant，且 enchant >= min_enchant
#
# 未涵蓋（需 step-function 或新欄位，留待後續子任務）：
#   - 體力臂甲 300429 / 法師臂甲 300431 / 守護的臂甲 300430（step-function）
#   - 火神武器 410207-410214（PVPDMG 維度 step-function）
#   - 咆哮雙刀 410188（X2 維度，EquipStats 無對應欄位）
# ----------------------------------------------------------------------------

